server {
    listen 80;
    server_name boboexpress.com www.boboexpress.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name boboexpress.com www.boboexpress.com;

    ssl_certificate     /etc/letsencrypt/live/boboexpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/boboexpress.com/privkey.pem;

    # Frontend (Flutter Web static)
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API Django
    location /api/ {
        # CORS (for browser requests)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Type, Authorization' always;

        # Preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        client_max_body_size 20M;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # web service name from docker-compose.prod.yml
        proxy_pass http://web:8000/api/;
        proxy_redirect off;

    }

    # Django admin
    location /admin/ {
        client_max_body_size 20M;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_pass http://web:8000/admin/;
        proxy_redirect off;
    }

    # Django static files collected by collectstatic
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Media files from Django (if used)
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy same-origin;
}

