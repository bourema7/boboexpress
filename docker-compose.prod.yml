version: '3.9'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-boboexpress}
      MYSQL_USER: ${MYSQL_USER:-boboexpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-boboexpress}
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn BoboExpress.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - .:/app
      - static_data:/app/staticfiles
      - media_data:/app/media
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE:-boboexpress}
      - MYSQL_USER=${MYSQL_USER:-boboexpress}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-boboexpress}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-supersecretkey}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-your-domain.com}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://your-domain.com}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://your-domain.com}
      - USE_SQLITE=False
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./mobile/build/web:/var/www/html:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    depends_on:
      - web

volumes:
  db_data:
  static_data:
  media_data:
